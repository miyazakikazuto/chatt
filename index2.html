<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mau jadi pacarku gak? 🥺</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --pink: #ff8fab;
    --pink-dark: #ff5c8a;
    --lav: #c9b6ff;
    --peach: #ffd6a5;
    --text: #5b3a52;
  }

  *{ box-sizing: border-box; }

  html, body{
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    font-family: 'Quicksand', sans-serif;
    background: linear-gradient(135deg, #ffe3ec 0%, #f4e3ff 45%, #fff0e0 100%);
    background-size: 400% 400%;
    animation: bgShift 12s ease infinite;
    color: var(--text);
  }

  @keyframes bgShift{
    0%{ background-position: 0% 50%; }
    50%{ background-position: 100% 50%; }
    100%{ background-position: 0% 50%; }
  }

  .heart{
    position: fixed;
    bottom: -10%;
    font-size: 22px;
    opacity: 0.75;
    pointer-events: none;
    animation: floatUp linear infinite;
    user-select: none;
    z-index: 0;
  }

  @keyframes floatUp{
    0%{ transform: translateY(0) rotate(0deg); opacity: 0; }
    10%{ opacity: 0.8; }
    100%{ transform: translateY(-115vh) rotate(360deg); opacity: 0; }
  }

  .stage{
    position: relative;
    width: 100%;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    z-index: 1;
  }

  .card{
    position: relative;
    max-width: 440px;
    width: 100%;
    background: rgba(255,255,255,0.55);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.6);
    border-radius: 28px;
    padding: 40px 28px 48px;
    box-shadow: 0 20px 45px rgba(255, 140, 170, 0.25);
    text-align: center;
    animation: popIn 0.6s cubic-bezier(.34,1.56,.64,1) both;
  }

  @keyframes popIn{
    0%{ transform: scale(0.8) translateY(20px); opacity: 0; }
    100%{ transform: scale(1) translateY(0); opacity: 1; }
  }

  .bear{
    font-size: 54px;
    display: inline-block;
    margin-bottom: 6px;
    animation: wiggle 2.4s ease-in-out infinite;
  }

  @keyframes wiggle{
    0%, 100%{ transform: rotate(-4deg); }
    50%{ transform: rotate(4deg); }
  }

  h1{
    font-family: 'Poppins', sans-serif;
    font-size: clamp(22px, 6vw, 30px);
    line-height: 1.35;
    margin: 4px 0 6px;
    color: var(--pink-dark);
  }

  .subtitle{
    font-size: 14.5px;
    color: #8a6b81;
    margin-bottom: 30px;
  }

  .to-name{
    font-weight: 700;
    color: var(--pink-dark);
  }

  .btn-row{
    position: relative;
    display: flex;
    gap: 16px;
    justify-content: center;
    align-items: center;
    min-height: 130px;
  }

  button{
    font-family: 'Quicksand', sans-serif;
    font-weight: 700;
    border: none;
    border-radius: 999px;
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.2s ease, background 0.2s ease, font-size 0.2s ease, padding 0.2s ease;
    -webkit-tap-highlight-color: transparent;
  }

  #yesBtn{
    background: linear-gradient(135deg, var(--pink), var(--pink-dark));
    color: white;
    font-size: 17px;
    padding: 14px 28px;
    box-shadow: 0 10px 22px rgba(255, 92, 138, 0.4);
  }

  #yesBtn:hover{
    transform: translateY(-2px) scale(1.03);
  }

  #noBtn{
    background: #fff;
    color: #9a7d92;
    font-size: 15px;
    padding: 12px 22px;
    box-shadow: 0 6px 14px rgba(0,0,0,0.08);
    position: relative;
    z-index: 2;
  }

  #noBtn.fixed-pos{
    position: fixed;
  }

  .hint{
    margin-top: 22px;
    font-size: 12.5px;
    color: #a988a0;
    min-height: 16px;
  }

  /* ===== Celebration screen ===== */
  .celebrate{
    display: none;
    text-align: center;
  }

  .celebrate .bear{
    font-size: 62px;
  }

  .celebrate h1{
    color: var(--pink-dark);
  }

  .celebrate p{
    font-size: 14.5px;
    color: #8a6b81;
    line-height: 1.6;
    margin-top: 10px;
  }

  .final-heart{
    font-size: 40px;
    margin: 6px 0;
    animation: beat 1s ease-in-out infinite;
    display: inline-block;
  }

  @keyframes beat{
    0%, 100%{ transform: scale(1); }
    50%{ transform: scale(1.18); }
  }

  .confetti-piece, .float-heart-burst{
    position: fixed;
    top: -10%;
    pointer-events: none;
    z-index: 10;
    animation: fall linear forwards;
  }

  @keyframes fall{
    to{ transform: translateY(110vh) rotate(540deg); opacity: 0.9; }
  }

  @media (max-width: 380px){
    .card{ padding: 32px 18px 40px; }
    .btn-row{ min-height: 150px; }
  }
</style>
</head>
<body>

<div class="stage">
  <div class="card" id="mainCard">

    <!-- ===== QUESTION SCREEN ===== -->
    <div id="questionScreen">
      <div class="bear">🐻💌</div>
      <h1>Hai <span class="to-name">Dewi</span>,<br>mau jadi pacarku gak? 🥺</h1>
      <p class="subtitle">tenang, pertanyaan ini gampang kok...</p>

      <div class="btn-row">
        <button id="yesBtn" onclick="sayYes()">Ya, mau! 💕</button>
        <button id="noBtn" onclick="dodge()" onmouseenter="dodge()" ontouchstart="dodgeTouch(event)">Enggak</button>
      </div>

      <div class="hint" id="hint"></div>
    </div>

    <!-- ===== CELEBRATION SCREEN ===== -->
    <div id="celebrateScreen" class="celebrate">
      <div class="bear">🐻💖🐻</div>
      <h1>Yeayyy!! 🎉</h1>
      <div class="final-heart">💗</div>
      <p id="finalMsg">Makasih ya udah mau jadi pacarku, <span class="to-name">Dewi</span>.<br>Ini baru awal dari banyak cerita seru kita berdua. Aku sayang kamu! 🥹✨</p>
    </div>

  </div>
</div>

<script>
  // ---------- Floating background hearts ----------
  const heartEmojis = ["💗","💕","💖","💓","🩷"];
  function spawnHeart(){
    const h = document.createElement("div");
    h.className = "heart";
    h.textContent = heartEmojis[Math.floor(Math.random()*heartEmojis.length)];
    h.style.left = Math.random()*100 + "vw";
    h.style.fontSize = (16 + Math.random()*20) + "px";
    const duration = 7 + Math.random()*6;
    h.style.animationDuration = duration + "s";
    document.body.appendChild(h);
    setTimeout(()=> h.remove(), duration*1000 + 500);
  }
  setInterval(spawnHeart, 550);
  for(let i=0;i<8;i++) setTimeout(spawnHeart, i*300);

  // ---------- "Enggak" button dodge logic ----------
  const noBtn = document.getElementById("noBtn");
  const yesBtn = document.getElementById("yesBtn");
  const hint = document.getElementById("hint");

  const teases = [
    "Enggak",
    "Yakin? 👀",
    "Coba pikir lagi deh...",
    "Masa sih? 🥺",
    "Eh jangan gitu dong",
    "Ini beneran jawaban terakhir?",
    "Hmm... kayaknya enggak deh 😏",
    "Serius amat sih",
    "Ya udah klik yang satu lagi aja 👉",
    "Tombol ini nyerah duluan 😅"
  ];

  let tries = 0;
  let yesScale = 1;

  function dodge(){
    tries++;

    // move button to a random position within viewport (with padding)
    const btnW = noBtn.offsetWidth;
    const btnH = noBtn.offsetHeight;
    const pad = 20;
    const maxX = window.innerWidth - btnW - pad;
    const maxY = window.innerHeight - btnH - pad;
    const randX = Math.max(pad, Math.random() * maxX);
    const randY = Math.max(pad, Math.random() * maxY);

    noBtn.classList.add("fixed-pos");
    noBtn.style.left = randX + "px";
    noBtn.style.top = randY + "px";
    noBtn.style.margin = "0";

    // shrink slightly each time, floor it so it stays clickable-ish (but hard)
    const scale = Math.max(0.55, 1 - tries * 0.05);
    noBtn.style.fontSize = (15 * scale) + "px";
    noBtn.style.padding = (12*scale) + "px " + (22*scale) + "px";

    // change teasing text
    const msg = teases[Math.min(tries-1, teases.length-1)];
    noBtn.textContent = msg;

    // grow the yes button
    yesScale = Math.min(1.9, 1 + tries * 0.09);
    yesBtn.style.transform = `scale(${yesScale})`;
    yesBtn.style.fontSize = (17 * Math.min(1.3, 1 + tries*0.03)) + "px";

    hint.textContent = tries >= 4 ? "kayaknya tombol 'Enggak' udah capek lari 🐻💨" : "";
  }

  function dodgeTouch(e){
    e.preventDefault();
    dodge();
  }

  // ---------- "Ya" click -> celebration ----------
  function sayYes(){
    document.getElementById("questionScreen").style.display = "none";
    document.getElementById("celebrateScreen").style.display = "block";
    burst();
  }

  const confettiColors = ["#ff8fab","#ffd6a5","#c9b6ff","#ffe066","#a0e7e5"];
  function burst(){
    // confetti
    for(let i=0;i<60;i++){
      setTimeout(()=>{
        const c = document.createElement("div");
        c.className = "confetti-piece";
        const size = 6 + Math.random()*7;
        c.style.width = size + "px";
        c.style.height = (size*0.4) + "px";
        c.style.background = confettiColors[Math.floor(Math.random()*confettiColors.length)];
        c.style.left = Math.random()*100 + "vw";
        c.style.borderRadius = "2px";
        const dur = 2.5 + Math.random()*2;
        c.style.animationDuration = dur + "s";
        document.body.appendChild(c);
        setTimeout(()=> c.remove(), dur*1000 + 300);
      }, i*25);
    }
    // heart burst
    for(let i=0;i<24;i++){
      setTimeout(()=>{
        const h = document.createElement("div");
        h.className = "float-heart-burst";
        h.textContent = heartEmojis[Math.floor(Math.random()*heartEmojis.length)];
        h.style.left = Math.random()*100 + "vw";
        h.style.fontSize = (18 + Math.random()*18) + "px";
        const dur = 3 + Math.random()*2;
        h.style.animationDuration = dur + "s";
        document.body.appendChild(h);
        setTimeout(()=> h.remove(), dur*1000 + 300);
      }, i*40);
    }
  }
</script>
</body>
</html>
